name: Build Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Deny-all by default. The release-write token is granted only to the dedicated
# `release` job below, which runs no third-party build code.
permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # `--target` nests selected-target output under this release-only root. The
    # cache key below still distinguishes every target triple explicitly.
    env:
      CARGO_TARGET_DIR: target/ci-release
      CARGO_BUILD_TARGET: ${{ matrix.target }}
    # Read-only: this job runs untrusted third-party code (npm install scripts,
    # cargo build scripts/proc-macros). Keeping it without write scopes means a
    # poisoned dependency has no release/packages token to steal. The compiled
    # artifacts are handed to the privileged `release` job out-of-band.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset_name: serval-linux-amd64
            bin: serval
          # arm64 is a first-class citizen: built natively on an arm64 runner
          # instead of cross-compiling, matching the Docker build strategy.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: serval-linux-arm64
            bin: serval
          - os: macos-26
            target: aarch64-apple-darwin
            asset_name: serval-macos-arm64
            bin: serval
          - os: macos-26-intel
            target: x86_64-apple-darwin
            asset_name: serval-macos-amd64
            bin: serval
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: serval-windows-amd64.exe
            bin: serval.exe

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      # rust-cache recognizes Cargo's nested target-triple directories beneath
      # this release-only root. The target-triple key prevents cross-target
      # reuse; only a release tag push may save, so a PR and a manually
      # dispatched arbitrary ref can only restore caches.
      - name: Cache Rust release dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-serval-rust
          shared-key: ci-release-${{ matrix.target }}
          workspaces: . -> target/ci-release
          cache-bin: false
          cache-workspace-crates: false
          save-if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          SERVAL_SKIP_FRONTEND_BUILD: "1"

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "${CARGO_TARGET_DIR}/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  # Privileged publish step, isolated from all build code. It only downloads the
  # already-built artifacts and attaches them to the release, so the
  # `contents: write` token is never exposed to npm/cargo dependency code.
  release:
    name: Attach binaries to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
